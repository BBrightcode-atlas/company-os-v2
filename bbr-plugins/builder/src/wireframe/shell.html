<!DOCTYPE html>
<html lang="ko" data-theme="corporate">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    와이어프레임 Shell — 결정적 골격(코드가 소유, LLM 이 아님).
    화면 fragment 들은 아래 main 안의 SCREENS 슬롯 자리에 조립된다(그 슬롯 주석이 유일하게
    교체 대상이며, 이 설명 주석에는 그 토큰을 그대로 쓰지 않는다 — 중첩 주석 종료를 피하기 위함).
    원칙: 룩 = DaisyUI, 동작 = App 코어. fragment 는 App 을 "호출만" 하고 재정의하지 않는다.
  -->

  <!-- 시각 규약: DaisyUI 5 (컴포넌트) + 전체 테마 + Tailwind v4 browser(런타임 컴파일) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
      --font-sans: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    }
  </style>
  <style>
    /* 화면 토글: 활성 화면만 표시(App.go 가 hidden 속성을 제어) */
    [data-screen][hidden] { display: none !important; }
    /* 화면 폭 통일: 독립 생성된 fragment 가 제각각 고른 max-width 를 덮어써, 같은 진입 기기로 분류된
       화면들을 일관된 폭으로 맞춘다(기기는 inferScreenDevices 로 추론해 data-device 로 표기). 기본=모바일. */
    [data-screen] { max-width: 28rem !important; margin-left: auto !important; margin-right: auto !important; }
    [data-screen][data-device="tablet"] { max-width: 48rem !important; }
    [data-screen][data-device="desktop"] { max-width: 72rem !important; }
  </style>

  <!--
    App 코어 — fragment 보다 먼저 정의되어야 한다(fragment 인라인 script 가 main 안에서
    App 을 호출하므로). 그래서 head 에 둔다.

    [fragment 규약]
      화면 전환:  <button onclick="App.go('SCR-002')">   ← 미리보기 엣지 파서 정합(onclick 의 go() 추출)
      커스텀 동작: <button data-action="addNote">  +  <script>App.on('addNote', function(el, e){ ... })</script>
      상태:        App.state.<key>            (공유 네임스페이스)
      리렌더:      App.onRender(function(){ ... })  — 상태 변경 후 App.render()
      모달:        App.openModal('dlgId') / App.closeModal('dlgId')   (DaisyUI <dialog class="modal">)
  -->
  <script>
    window.App = (function () {
      var App = {
        state: {},
        _handlers: {},
        _renderers: [],
        _history: [], // 방문한 화면 코드 스택(뒤로가기가 '들어온 경로'로 복원하기 위함)

        // 화면 전환: 대상 data-screen 만 보이고 나머지는 hidden
        go: function (code, opts) {
          var secs = document.querySelectorAll("[data-screen]");
          var exists = false;
          for (var k = 0; k < secs.length; k++) {
            if (secs[k].getAttribute("data-screen") === code) { exists = true; break; }
          }
          if (!exists) return; // 알 수 없는 코드는 무시(전 화면이 사라지는 것을 막는다)
          var cur = App.state.__current;
          // 직전 화면을 이력에 쌓는다(back() 에 의한 복귀일 때는 noPush 로 쌓지 않아 무한 왕복을 막는다).
          if (cur && cur !== code && !(opts && opts.noPush)) App._history.push(cur);
          for (var i = 0; i < secs.length; i++) {
            secs[i].hidden = secs[i].getAttribute("data-screen") !== code;
          }
          App.state.__current = code;
          try { window.scrollTo(0, 0); } catch (e) {}
        },

        // 뒤로가기: 고정 대상이 아니라 방문 이력의 직전 화면으로 복귀한다(진입 경로 기준). 루트면 무시(no-op).
        back: function () {
          if (!App._history.length) return;
          App.go(App._history.pop(), { noPush: true });
        },

        // 커스텀 동작 핸들러 등록(data-action 위임 대상)
        on: function (action, fn) { App._handlers[action] = fn; },

        // 상태 기반 리렌더러 등록 + 즉시 1회 실행
        onRender: function (fn) {
          App._renderers.push(fn);
          try { fn(); } catch (e) {}
        },
        render: function () {
          for (var i = 0; i < App._renderers.length; i++) {
            try { App._renderers[i](); } catch (e) {}
          }
        },

        // DaisyUI <dialog class="modal"> 제어
        openModal: function (id) {
          var d = document.getElementById(id);
          if (d && typeof d.showModal === "function") d.showModal();
        },
        closeModal: function (id) {
          var d = document.getElementById(id);
          if (d && typeof d.close === "function") d.close();
        },
      };

      // 클릭 위임: 내부 <a href> 이탈 방지 → 화면 전환(data-nav/target/goto) → 커스텀 동작(data-action).
      function dispatch(e) {
        var t = e.target;
        if (!t || !t.closest) return;
        // 뒤로가기: data-back / data-action(back 류) / data-nav=back 은 '이력 기반 복귀'로 처리(고정 대상 아님).
        var backEl = t.closest("[data-back],[data-action='back'],[data-action='goBack'],[data-action='goback'],[data-action='navigateBack'],[data-action='prev'],[data-action='previous'],[data-nav='back'],[data-nav='prev'],[data-nav='previous']");
        if (backEl) { e.preventDefault(); App.back(); return; }
        var a = t.closest("a[href]");
        if (a) {
          var h = a.getAttribute("href") || "";
          var hm = h.match(/^#(.+)$/);
          if (hm && document.querySelector('[data-screen="' + hm[1] + '"]')) { e.preventDefault(); App.go(hm[1]); return; }
          if (/^(?:\/|#|\.|javascript:)/.test(h)) e.preventDefault(); // SPA 내부 링크는 iframe 이탈 막기
        }
        var navEl = t.closest("[data-nav],[data-target],[data-goto]");
        if (navEl) {
          var code = navEl.getAttribute("data-nav") || navEl.getAttribute("data-target") || navEl.getAttribute("data-goto");
          if (code) { e.preventDefault(); App.go(code); return; }
        }
        var actEl = t.closest("[data-action]");
        if (actEl) {
          var fn = App._handlers[actEl.getAttribute("data-action")];
          if (fn) { e.preventDefault(); fn(actEl, e); }
        }
      }
      document.addEventListener("click", dispatch);
      document.addEventListener("submit", dispatch);

      // 초기 표시: 첫 화면만
      document.addEventListener("DOMContentLoaded", function () {
        var first = document.querySelector("[data-screen]");
        if (first) App.go(first.getAttribute("data-screen"));
      });

      return App;
    })();
  </script>
</head>
<body class="bg-base-200 text-base-content font-sans antialiased">
  <main id="screens"><!--SCREENS--></main>
</body>
</html>
