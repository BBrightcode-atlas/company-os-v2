# pnpm 11+ moved these settings out of package.json's "pnpm" field.
# Override the workspace SDK/shared packages to the locally-vendored tarballs
# so the plugin builds standalone (outside the monorepo).
overrides:
  '@paperclipai/shared': 'file:.paperclip-sdk/shared-v2.tgz'
  '@paperclipai/shared@0.3.1': 'file:.paperclip-sdk/shared-v2.tgz'
onlyBuiltDependencies:
  - esbuild
allowBuilds:
  esbuild: set this to true or false
